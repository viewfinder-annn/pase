    /work/user_data/xiaobin/Datasets/meta_files/LibriSpeech_cleaned/dev-clean.scp,    
  ]
  noise_scps: [
    /work/user_data/xiaobin/Datasets/meta_files/URGENT2/dns5_fullband/meta_noise_resampled_validation.scp,
    # /work/user_data/xiaobin/Datasets/meta_files/URGENT2/fma/meta_noise_resampled_validation.scp,
    # /work/user_data/xiaobin/Datasets/meta_files/URGENT2/fsd50k/meta_noise_resampled_validation.scp
  ]
  rir_scps: [
    /work/user_data/xiaobin/Datasets/meta_files/URGENT2/dns5_fullband/meta_rir.scp
  ]
  wav_len: 4
